<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stone.io</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0808; }
      canvas { display: block; cursor: default; touch-action: none; }

      .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.72);
        z-index: 10;
        font-family: monospace;
        color: #e8dcc8;
      }
      .overlay-box {
        background: rgba(12,8,6,0.96);
        border: 1px solid rgba(200,168,75,0.55);
        border-radius: 8px;
        padding: 32px 40px;
        min-width: 320px;
        text-align: center;
      }
      .overlay-box h1 {
        font-size: 28px;
        letter-spacing: 4px;
        color: #C8A84B;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 11px;
        color: #6a5a3a;
        margin-bottom: 28px;
        letter-spacing: 2px;
      }
      .overlay-box input[type="text"] {
        display: block;
        width: 100%;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(200,168,75,0.4);
        border-radius: 4px;
        color: #e8dcc8;
        font-family: monospace;
        font-size: 15px;
        padding: 8px 12px;
        margin-bottom: 16px;
        outline: none;
        text-align: center;
      }
      .overlay-box input[type="text"]::placeholder { color: #4a3a2a; }
      .overlay-box input[type="text"]:focus { border-color: rgba(200,168,75,0.85); }
      .btn {
        display: inline-block;
        padding: 10px 36px;
        background: rgba(200,168,75,0.18);
        border: 1px solid rgba(200,168,75,0.65);
        border-radius: 4px;
        color: #C8A84B;
        font-family: monospace;
        font-size: 13px;
        letter-spacing: 2px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn:hover { background: rgba(200,168,75,0.32); }
      .dead-stats {
        margin-bottom: 20px;
        line-height: 2.2;
        font-size: 13px;
        color: #7a6040;
      }
      .dead-stats span { color: #C8A84B; font-size: 15px; }
      .dead-countdown {
        font-size: 11px;
        color: #4a3a2a;
        letter-spacing: 1px;
      }
      .dead-countdown span { color: #8a7050; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="lobby-overlay" class="overlay">
      <div class="overlay-box">
        <h1>STONE.IO</h1>
        <div class="subtitle">absorb · grow · survive</div>
        <input id="nickname-input" type="text" maxlength="16" placeholder="enter nickname" autocomplete="off" />
        <button id="play-btn" class="btn">PLAY</button>
      </div>
    </div>

    <div id="dead-overlay" class="overlay" style="display:none">
      <div class="overlay-box">
        <h1>CRUSHED</h1>
        <div class="subtitle">hit by a gear</div>
        <div class="dead-stats">
          peak radius &nbsp;<span id="dead-radius">0</span><br>
          rank &nbsp;<span id="dead-rank">--</span>
        </div>
        <div class="dead-countdown">respawning in <span id="dead-countdown">2.0</span>s</div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
